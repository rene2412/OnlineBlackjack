events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Good practice for WS "Connection" header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name _;

        # Serve React frontend
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API: /api/shuffle -> upstream /api/shuffle? (you registered /api/shuffle)
        # IMPORTANT: since your handler includes /api in the path, do NOT strip it.
        # So we keep NO trailing slash here.
        location /api/ {
            proxy_pass http://127.0.0.1:8081;   # <-- NO trailing slash
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket: must NOT rewrite path; upstream expects /ws/game
        location /ws/ {
            proxy_pass http://127.0.0.1:8081;   # <-- NO trailing slash
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
    }
}
